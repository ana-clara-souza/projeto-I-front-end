<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 8" width="10" height="8" shape-rendering="crispEdges">
  <!-- barra superior -->
  <rect x="3" y="0" width="4" height="1" fill="white"/>

  <!-- laterais superiores -->
  <rect x="2" y="1" width="1" height="4" fill="white"/>
  <rect x="7" y="1" width="1" height="4" fill="white"/>

  <!-- joelhos / parte interna -->
  <rect x="3" y="5" width="1" height="1" fill="white"/>
  <rect x="6" y="5" width="1" height="1" fill="white"/>

  <!-- laterais inferiores -->
  <rect x="2" y="6" width="1" height="1" fill="white"/>
  <rect x="7" y="6" width="1" height="1" fill="white"/>

  <!-- pés -->
  <rect x="1" y="7" width="1" height="1" fill="white"/>
  <rect x="8" y="7" width="1" height="1" fill="white"/>
</svg>
