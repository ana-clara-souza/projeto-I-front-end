<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindos ao site oficial do Minecraft | Minecraft</title>

    <style>
        body {
            margin: 0;
            background-color: #313131;
        }

        .wrapper {
            width: 100%;
            height: auto;
        }

        .back-video {
            position: fixed;
            top: 80px;
            left: 0;
            width: 100%;
            height: 85%;
            object-fit: cover;
            z-index: -1;
            border-top: 1.5px solid black;
        }

        .logo {
            width: 224px;
            height: 95px;
            margin-right: 30px;
            margin-left: 30px;
        }

        header {
            top: 15px;
            width: 100%;
            height: 10%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .menu li, .menu2 li {
            display: inline-flex;
            align-items: center;
            margin-right: 20px;
            font-family:
            "Noto Sans", "Helvetica Neue", "Helvetica", "Arial", "sans-serif";
            font-size: .75rem;
            font-weight: 700;
            height: 100%;
            color: white;
        }

        .menu2 li {
            margin-right: 30px;
        }

        @font-face {
            font-family: "MinecraftSeven-v2";
            src: url("Minecraft-Seven_v2.otf") format("opentype");
        }

        @font-face {
            font-family: "MinecraftSeven";
            src: url("MinecraftSeven.ttf") format("truetype");
        }

        .text {
            width: 400px;
            height: 150px;
            background-color: #131313;
            border-top: 4px solid #313131;
            position: absolute;
            right: 50%;
            bottom: 0px;
            padding: 30px;
        }

        h2 {
            font-family:
            "MinecraftSeven-v2",
            "MinecraftSeven",
            "Noto Sans",
            "Helvetica Neue",
            "Helvetica",
            "Arial",
            sans-serif;
            color: white;
        }

        p {
            color: #d0c5c0;
            margin-top: 16px;
        }

        .menu2 .comprar {
            border: 3px solid green;
            padding: 10px;
            color: green;
        }

        .icone-pesquisa {
            
        }

        .seta {
            gap: 4px;
        }
        .menu2 .conta{
            margin: 10px;
        }

        .chevron-down {
            width: 10px;
            height: 10px;
            filter: brightness(0) invert(1);
            display: inline-block;
            vertical-align: middle;
        }

        .pixel-user-white{
            width: 20px;
            height: 20px;
            display: inline-block;
            vertical-align: middle;
            margin: 3px;
        }

    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <img src="minecraft-logo.svg" class="logo">

            <ul class="menu">
                <li class="seta">JOGOS
                    <img src="icon-chevron-down.svg" class="chevron-down" alt="">
                </li>
                <li class="seta">LOJA
                    <img src="icon-chevron-down.svg" class="chevron-down" alt="">
                </li>
                <li class="seta">EXPLORAR
                    <img src="icon-chevron-down.svg" class="chevron-down" alt="">
                </li>
                <li class="seta">APRENDA
                    <img src="icon-chevron-down.svg" class="chevron-down" alt="">
                </li>
                <li>SUPORTE</li>
            </ul>

            <ul class="menu2">
                <li class="comprar">COMPRAR AGORA
                    <img src="pixel-chevron-down-green.svg" class="chevron-down" alt="">
                </li>
                <li class="icone-pesquisa">
                    <img src="icon-search.svg" width="20" alt="">
                    <img src="icon-chevron-down.svg" class="chevron-down" alt="">
                </li>
                <li class="conta">
                    <img src="pixel-user-white.svg" class="pixel-user-white" alt="">
                    CONTA
                    <img src="icon-chevron-down.svg" class="chevron-down" alt="">
                </li>
            </ul>
        </header>

        <video autoplay muted loop class="back-video">
            <source src="video.mp4" type="video/mp4">
        </video>

        <div class="black-box-1"></div>
        <div class="black-box-2"></div>

        <div class="text">
            <h2>O lançamento Tiny takeover</h2>
            <p>Novas versões de mobs bebês estão causando uma sobrecarga de fofura por todos os biomas e construções. Colecione, abrace e encante-se com nossos novos pequenos danadinhos.</p>
        </div>
    </div>

</body>
</html>
