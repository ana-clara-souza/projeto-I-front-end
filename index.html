<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <!-- Responsividade para celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bem-vindos ao site oficial do Minecraft | Minecraft</title>

  <!-- CSS externo-->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Wrapper principal da página -->
  <div class="wrapper">

    <!-- Cabeçalho do site -->
    <header>

      <!-- Logo MINECRAFT -->
      <img src="assets/imagens/minecraft-logo.svg" class="logo" alt="Minecraft">

      <!-- Menu principal PC -->
      <ul class="menu">
        <li class="seta">
          JOGOS
          <img src="assets/icons/icon-chevron-down.svg" class="chevron-down" alt="">
        </li>

        <li class="seta">
          LOJA
          <img src="assets/icons/icon-chevron-down.svg" class="chevron-down" alt="">
        </li>

        <li class="seta">
          EXPLORAR
          <img src="assets/icons/icon-chevron-down.svg" class="chevron-down" alt="">
        </li>

        <li class="seta">
          APRENDA
          <img src="assets/icons/icon-chevron-down.svg" class="chevron-down" alt="">
        </li>

        <li>
          SUPORTE
        </li>
      </ul>

      <!-- Menu que abre -->
      <ul class="menu2">
        <li class="comprar">
          COMPRAR AGORA
          <img src="assets/icons/pixel-chevron-down-green.svg" class="chevron-down" alt="">
        </li>

        <li>
          <img src="assets/icons/icon-search.svg" class="icone-pesquisa" alt="Pesquisar">
          <img src="assets/icons/icon-chevron-down.svg" class="chevron-down" alt="">
        </li>

        <li class="conta">
          <img src="assets/icons/pixel-user-white.svg" class="pixel-user-white" alt="Conta">
          CONTA
          <img src="assets/icons/icon-chevron-down.svg" class="chevron-down" alt="">
        </li>
      </ul>

      <!-- Menu para celular -->
      <div class="menu-mobile">
        <a href="#" class="comprar-mobile">
          COMPRAR
          <img src="assets/icons/pixel-chevron-down-green.svg" class="chevron-down" alt="">
        </a>

        <button class="botao-menu" aria-label="Abrir menu">
          <img src="assets/icons/icon-hamburger.svg" class="icone-menu" alt="Menu">
        </button>
      </div>

    </header>

    <!-- Área principal do banner -->
    <main>

      <section class="banner">

        <!-- Área do vídeo -->
        <div class="video-box">
          <video autoplay muted loop class="back-video">
            <source src="assets/videos/video.mp4" type="video/mp4">
          </video>

          <!-- Botão lateral do banner -->
          <div class="botao-proximo"></div>
        </div>

        <!-- Área inferior do banner -->
        <div class="hero-bottom">

          <!-- Caixa preta de texto -->
          <div class="text">

            <!-- Quadradinhos pixelados superiores -->
            <div class="boxs">
              <div class="black-box-1"></div>
              <div class="black-box-2"></div>
            </div>

            <div class="titulo-box">
              <h2>O lançamento Tiny Takeover</h2>
            </div>

            <p>
              Novas versões de mobs bebês estão causando uma sobrecarga de fofura por
              todos os biomas e construções. Colecione, abrace e encante-se com nossos
              novos pequenos danadinhos.
            </p>

          </div>

        </div>

      </section>

    </main>

  </div>

</body>
</html>
