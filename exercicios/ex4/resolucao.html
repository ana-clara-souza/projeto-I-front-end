
<!doctype HTML>
<html>
  <head>
    <meta charset="utf-8">
    <title>CSS - Exercício de Drop-Down</title>
    <style type="text/css" media="all">
      .red { background-color: red; }
      .blue { background-color: blue; }
      .green { background-color: green; }
      .yellow { background-color: yellow; }
      .orange { background-color: orange; }
      .menu li {
        display: block;
        height: 100px;
        width: 200px;
        position: relative;
      }
      .menu { padding-left: 0; }
      .menu li:hover .menu {
        opacity: 1;
        transform: translateX(0px) scale(1) rotate(720deg);
      }
      .menu .menu {
        position: absolute;
        left: 100%;
        opacity: 0;
        
      }
      .menu .menu li {
        border: 1px solid black;
        background-color: gray;
      }
    </style>
  </head>
  <body>
    <ul class="menu">
      <li class="red">
        <ul class="menu">
          <li></li>
          <li></li>
          <li></li>
        </ul>
      </li>
      <li class="blue"></li>
      <li class="green"></li>
      <li class="yellow"></li>
      <li class="orange"></li>
    </ul>
    
  </body>
</html>
