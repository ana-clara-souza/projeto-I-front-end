<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        body {
            margin:0;
        }
        .wrapper{
            max-width: 1000px;
            margin: 0 auto;
        }
        .blue{
            width:100%;
            height: 100px;
            background-color: blue;
        }
        .red{
            float: left;
            width: 20%;
            height: 500px;
            background-color: red;
        }

        .green{
            float: left;
            width: 60%;
            height: 500px;
            background-color: green;
        }
        .grey{
            background-color: gray;
            width: 50%;
            height: 70px;
            margin: 100px auto;
        }
        .orange{
            float: left;
            width: 20%;
            height: 300px;
            background-color: orange;
        }
        .yellow{
            clear: both;
            width:100%;
            height: 100px;
            background-color: yellow;
        }


        
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="blue"></div>
        <div class="red"></div>
        <div class="green">
            <div class="grey"></div>
        </div>
        <div class="orange"></div>
        <footer class="yellow"></footer>

    </div>
    
</body>
</html>
