<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        body { margin:0;}

        header {
            width:100%;
            height:150px;
            background-color: red;
        }

        .lateral {
            width: 20%;
            height: 300px;
            background-color: blue ;

        }
        main {
            width:60%;
            height: 300px;
            background-color: green;
        }
        .propaganda {
            width:20%;
            height: 200px;
            background-color: yellow ;
        }
        .flutuante {
            float:left;
        }
        footer{
            width: 100%;
            height:100px;
            background-color: purple;
            clear:both;
        }
        .wrapper{
            max-width:1200px;
            margin: 0 auto;
        }
        nav {
            width: 100%;
            height: 50px;
            background-color: gray;
        }

    </style>
</head>
<body>
    <div class="wrapper">
        Elemento noralmente utilizado para definir o tamanho dos elementos da paágina
        <header></header>
        <nav></nav>
        <div class="lateral flutuante"></div>
        <main class="flutuante"></main>
        <div class="flutuante propaganda"></div>
        <footer></footer>
    </div>


</body>
</html>
