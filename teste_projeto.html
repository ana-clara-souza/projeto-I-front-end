<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindos ao site oficial do Minecraft | Minecraft</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: #313131;
            overflow-x: hidden;
        }

        .wrapper {
            width: 100%;
            min-height: 100vh;
            position: relative;
        }

        @font-face {
            font-family: "MinecraftSeven-v2";
            src: url("Minecraft-Seven_v2.otf") format("opentype");
        }

        @font-face {
            font-family: "MinecraftSeven";
            src: url("MinecraftSeven.ttf") format("truetype");
        }

        header {
            width: 100%;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 0 12px;
            background-color: #2a2626;
            border-bottom: 2px solid #1c1c1c;
            position: relative;
            z-index: 20;
        }

        .logo {
            width: 224px;
            height: auto;
            margin-right: 30px;
            margin-left: 30px;
            display: block;
        }

        .menu,
        .menu2 {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .menu li,
        .menu2 li {
            display: inline-flex;
            align-items: center;
            margin-right: 20px;
            font-family:
            "Noto Sans", "Helvetica Neue", "Helvetica", "Arial", "sans-serif";
            font-size: .75rem;
            font-weight: 700;
            color: white;
            gap: 4px;
            white-space: nowrap;
        }

        .menu2 li {
            margin-right: 30px;
        }

        .menu2 .comprar {
            border: 3px solid #2ea043;
            padding: 10px 14px;
            color: #2ea043;
        }

        .icone-pesquisa {
            filter: brightness(0) invert(1);
        }

        .seta {
            gap: 4px;
        }

        .chevron-down {
            width: 10px;
            height: 10px;
            filter: brightness(0) invert(1);
            display: inline-block;
            vertical-align: middle;
        }

        .pixel-user-white {
            width: 12px;
            height: 14px;
            display: inline-block;
            vertical-align: middle;
        }

        .mobile-actions {
            display: none;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        .comprar-mobile {
            border: 2px solid #2ea043;
            background: transparent;
            color: #2ea043;
            font-family:
            "Noto Sans", "Helvetica Neue", "Helvetica", "Arial", "sans-serif";
            font-size: 12px;
            font-weight: 700;
            padding: 10px 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .hamburger-mobile {
            width: 42px;
            height: 42px;
            border: none;
            background: #2ea043;
            color: white;
            font-size: 22px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .play-icon {
            width: 8px;
            height: 10px;
            display: inline-block;
        }

        .hero {
            position: relative;
            width: 100%;
            height: calc(100vh - 80px);
            min-height: 560px;
            overflow: hidden;
            border-top: 1.5px solid black;
            background: #000;
        }

        .back-video {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%) scale(1.18);
            transform-origin: center center;
            z-index: 1;
        }

        .text {
            width: 400px;
            max-width: calc(100% - 40px);
            min-height: 200px;
            background-color: #131313;
            border-top: 4px solid #313131;
            position: absolute;
            right: 50%;
            bottom: 0;
            padding: 30px;
            transform: translateX(50%);
            z-index: 5;
        }

        h2 {
            font-family:
            "MinecraftSeven-v2",
            "MinecraftSeven",
            "Noto Sans",
            "Helvetica Neue",
            "Helvetica",
            "Arial",
            sans-serif;
            color: white;
            margin-top: 0;
            line-height: 1.3;
        }

        p {
            color: #d0c5c0;
            margin-top: 16px;
            line-height: 1.6;
        }

        /* =========================
           TABLET
        ========================= */
        @media (max-width: 1024px) {
            .logo {
                width: 180px;
                margin-left: 12px;
                margin-right: 12px;
            }

            .menu li,
            .menu2 li {
                font-size: 11px;
                margin-right: 14px;
            }

            .hero {
                min-height: 480px;
            }

            .back-video {
                transform: translate(-50%, -50%) scale(1.14);
            }
        }

        /* =========================
           MOBILE
        ========================= */
        @media (max-width: 768px) {
            header {
                min-height: 68px;
                padding: 0 12px;
                gap: 10px;
                flex-wrap: nowrap;
            }

            .logo {
                width: 130px;
                margin: 0;
            }

            .menu,
            .menu2 {
                display: none;
            }

            .mobile-actions {
                display: flex;
            }

            .hero {
                height: 370px;
                min-height: auto;
                border-top: 2px solid #111;
            }

            .back-video {
                transform: translate(-50%, -50%) scale(1.22);
            }

            .text {
                position: relative;
                right: auto;
                bottom: auto;
                transform: none;
                width: 100%;
                max-width: 100%;
                min-height: auto;
                padding: 26px 20px 32px;
                background-color: #101010;
                border-top: 4px solid #2a2a2a;
                text-align: center;
            }

            h2 {
                font-size: 18px;
                line-height: 1.5;
                margin-bottom: 16px;
            }

            p {
                font-size: 15px;
                line-height: 1.7;
                margin-top: 0;
            }
        }

        /* =========================
           MOBILE PEQUENO
        ========================= */
        @media (max-width: 480px) {
            .logo {
                width: 118px;
            }

            .comprar-mobile {
                font-size: 11px;
                padding: 9px 12px;
            }

            .hamburger-mobile {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .hero {
                height: 330px;
            }

            .back-video {
                transform: translate(-50%, -50%) scale(1.26);
            }

            .text {
                padding: 22px 16px 28px;
            }

            h2 {
                font-size: 16px;
            }

            p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <img src="minecraft-logo.svg" class="logo" alt="Minecraft">

            <ul class="menu">
                <li class="seta">JOGOS
                    <img src="icon-chevron-down.svg" class="chevron-down" alt="">
                </li>
                <li class="seta">LOJA
                    <img src="icon-chevron-down.svg" class="chevron-down" alt="">
                </li>
                <li class="seta">EXPLORAR
                    <img src="icon-chevron-down.svg" class="chevron-down" alt="">
                </li>
                <li class="seta">APRENDA
                    <img src="icon-chevron-down.svg" class="chevron-down" alt="">
                </li>
                <li>SUPORTE</li>
            </ul>

            <ul class="menu2">
                <li class="comprar">COMPRAR AGORA</li>
                <li class="icone-pesquisa">
                    <img src="icon-search.svg" width="20" alt="">
                    <img src="icon-chevron-down.svg" class="chevron-down" alt="">
                </li>
                <li>CONTA
                    <img src="pixel-user-white.svg" class="pixel-user-white" alt="">
                    <img src="icon-chevron-down.svg" class="chevron-down" alt="">
                </li>
            </ul>

            <div class="mobile-actions">
                <button class="comprar-mobile">
                    COMPRAR
                    <img src="pixel-play-white.svg" class="play-icon" alt="">
                </button>
                <button class="hamburger-mobile">≡</button>
            </div>
        </header>

        <section class="hero">
            <video autoplay muted loop class="back-video">
                <source src="video.mp4" type="video/mp4">
            </video>

            <div class="text">
                <h2>O lançamento Tiny takeover</h2>
                <p>Novas versões de mobs bebês estão causando uma sobrecarga de fofura por todos os biomas e construções. Colecione, abrace e encante-se com nossos novos pequenos danadinhos.</p>
            </div>
        </section>
    </div>

</body>
</html>
